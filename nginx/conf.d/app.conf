# Для больших файлов API
client_max_body_size 100M;

# Docker DNS
resolver 127.0.0.11 valid=30s;

# HTTP -> HTTPS редирект для всех доменов
server {
    listen 80;
    server_name collapse-storage.skriney.online api.skriney.online;

    # Для автопродления SSL сертификатов
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё редиректим на HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Frontend
server {
    listen 443 ssl;
    server_name collapse-storage.skriney.online;

    ssl_certificate     /etc/nginx/ssl/live/collapse-storage.skriney.online/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/collapse-storage.skriney.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $frontend "frontend";
        proxy_pass http://$frontend:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Backend
server {
    listen 443 ssl;
    server_name api.skriney.online;

    ssl_certificate     /etc/nginx/ssl/live/api.skriney.online/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/live/api.skriney.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend "backend";
        proxy_pass http://$backend:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Проксировать заголовки авторизации
        proxy_pass_header Authorization;
    }
}

# Статусная страница Nginx
server {
    listen 127.0.0.1:8080;
    server_name localhost;

    location /nginx_status {
        stub_status;
        allow 127.0.0.1;
        deny all;
    }
}